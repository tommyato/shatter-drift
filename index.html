<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHATTER DRIFT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020208; }
    canvas { display: block; }

    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      font-family: 'Orbitron', 'Courier New', monospace;
      color: #fff;
      z-index: 10;
    }

    #hud-score {
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 32px;
      font-weight: 700;
      color: #00ffcc;
      text-shadow: 0 0 20px rgba(0,255,204,0.5);
      transition: transform 0.1s ease-out;
      transform-origin: right top;
    }

    #hud-distance {
      position: absolute;
      top: 58px;
      right: 28px;
      font-size: 16px;
      color: #668899;
    }

    #hud-speed {
      position: absolute;
      top: 20px;
      left: 28px;
      font-size: 18px;
      color: #ff66aa;
      text-shadow: 0 0 10px rgba(255,102,170,0.4);
    }

    #hud-combo {
      position: absolute;
      top: 80px;
      right: 28px;
      font-size: 20px;
      font-weight: 700;
      color: #ffcc00;
      text-shadow: 0 0 15px rgba(255,204,0,0.5);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s ease-out, text-shadow 0.15s;
      transform-origin: right top;
    }

    #hud-state-indicator {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    #hud-state-indicator.whole { color: #00ffcc; }
    #hud-state-indicator.shattered { color: #ff44ff; }

    #hud-powerup {
      position: absolute;
      top: 48px;
      left: 28px;
      font-size: 12px;
      color: #aa88ff;
      text-shadow: 0 0 10px rgba(170,136,255,0.4);
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #hud-boss-warning {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: #ff3333;
      text-shadow: 0 0 30px rgba(255,51,51,0.6), 0 0 60px rgba(255,51,51,0.3);
      letter-spacing: 6px;
      opacity: 0;
      pointer-events: none;
    }

    /* Center message */
    #center-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #center-message h2 {
      font-size: 56px;
      font-weight: 900;
      color: #ff4444;
      text-shadow: 0 0 40px rgba(255,68,68,0.6), 0 0 80px rgba(255,68,68,0.3);
      margin-bottom: 16px;
      animation: shatterIn 0.5s ease-out;
    }

    #center-message .stats {
      font-size: 20px;
      color: #aaccdd;
      line-height: 1.9;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    #center-message .stats .highlight {
      color: #ffcc00;
      text-shadow: 0 0 12px rgba(255,204,0,0.5);
    }

    #center-message .retry {
      font-size: 18px;
      color: #668899;
      margin-top: 28px;
      animation: promptPulse 1.5s ease-in-out infinite;
    }

    @keyframes shatterIn {
      0% { transform: scale(2) rotate(-5deg); opacity: 0; }
      60% { transform: scale(0.9) rotate(1deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Title screen */
    #title-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: auto;
    }

    #title-overlay h1 {
      font-family: 'Orbitron', monospace;
      font-size: 72px;
      font-weight: 900;
      color: #00ffcc;
      text-shadow: 0 0 60px rgba(0,255,204,0.4), 0 0 120px rgba(0,255,204,0.2);
      letter-spacing: 8px;
      margin-bottom: 4px;
      animation: titleGlow 3s ease-in-out infinite, titleGlitch 8s ease-in-out infinite;
      position: relative;
    }

    #title-overlay h1::after {
      content: '';
      display: block;
      width: 60%;
      height: 2px;
      margin: 8px auto 0;
      background: linear-gradient(90deg, transparent, #00ffcc, #ff44ff, #00ffcc, transparent);
      background-size: 200% 100%;
      animation: gradientSlide 3s linear infinite;
    }

    #title-overlay .tagline {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      color: #668899;
      letter-spacing: 6px;
      margin-bottom: 48px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    #title-overlay .controls {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: #445566;
      line-height: 2.2;
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    #title-overlay .controls span {
      color: #00ffcc;
      text-shadow: 0 0 8px rgba(0,255,204,0.3);
    }

    #title-overlay .prompt {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      color: #ffcc00;
      text-shadow: 0 0 20px rgba(255,204,0,0.4);
      animation: promptPulse 1.5s ease-in-out infinite, fadeInUp 0.8s ease-out 0.9s both;
    }

    #title-overlay .high-score {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: #556677;
      margin-top: 20px;
      letter-spacing: 1px;
      animation: fadeInUp 0.8s ease-out 1.2s both;
    }

    @keyframes promptPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.98); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 60px rgba(0,255,204,0.4), 0 0 120px rgba(0,255,204,0.2); }
      50% { text-shadow: 0 0 80px rgba(0,255,204,0.6), 0 0 160px rgba(0,255,204,0.3), 0 0 200px rgba(255,68,255,0.15); }
    }

    @keyframes titleGlitch {
      0%, 90%, 100% { transform: none; filter: none; }
      91% { transform: skewX(-2deg) translateX(-2px); filter: hue-rotate(60deg); }
      92% { transform: skewX(1deg) translateX(2px); filter: hue-rotate(-30deg); }
      93% { transform: none; filter: none; }
      94% { transform: skewX(-1deg) translateX(1px); filter: hue-rotate(30deg); }
      95% { transform: none; filter: none; }
    }

    @keyframes gradientSlide {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Three.js canvas -->

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="hud-score">0</div>
      <div id="hud-distance">0m</div>
      <div id="hud-speed"></div>
      <div id="hud-combo"></div>
      <div id="hud-powerup"></div>
      <div id="hud-boss-warning"></div>
      <div id="hud-state-indicator" class="whole">SOLID</div>
      <div id="center-message">
        <h2 id="center-title"></h2>
        <div class="stats" id="center-stats"></div>
        <div class="retry" id="center-retry"></div>
      </div>
    </div>

    <!-- Title -->
    <div id="title-overlay">
      <h1>SHATTER DRIFT</h1>
      <div class="tagline">BREAK TO SURVIVE</div>
      <div class="controls">
        <span>A/D</span> or <span>LEFT/RIGHT</span> &mdash; DODGE<br>
        HOLD <span>SPACE</span> or <span>CLICK</span> &mdash; SHATTER THROUGH OBSTACLES<br>
        RELEASE &mdash; RECOMBINE &amp; COLLECT ORBS<br>
        <span>PHASE STREAKS</span> = BONUS POINTS
      </div>
      <div class="prompt">PRESS SPACE OR CLICK</div>
      <div class="high-score" id="title-high-score"></div>
    </div>
  </div>

  <!-- Vibe Jam 2026 widget -->
  <script async src="https://vibej.am/2026/widget.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
